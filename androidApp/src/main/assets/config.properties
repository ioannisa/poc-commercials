# First-run template for Android.
#
# Bundled into the APK. On first launch the app copies this file to:
#   /sdcard/Android/data/eu.anifantakis.poc.ctv/files/config.properties
# All subsequent launches read that external file, so edits persist and
# survive app updates. Push via a file manager or `adb push`.
#
# 10.0.2.2 is the emulator's loopback to the host machine. For a physical
# device, change this to the dev machine's LAN IP (e.g. http://192.168.1.20:8080).
#
# The client only needs to know the application-server URL; MySQL is the
# server's concern and lives in the server's own config.properties.

server.baseUrl=http://10.0.2.2:8080
