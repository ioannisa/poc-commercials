// Compose stability: mark these external, effectively-immutable value types
// as stable so composables taking them stay skippable (kotlinx-datetime and
// kotlin.Pair have no @Stable/@Immutable of their own). Applied repo-wide via
// the kmp.feature convention plugin and the shared/grids build scripts.
kotlinx.datetime.LocalDate
kotlinx.datetime.LocalTime
kotlinx.datetime.LocalDateTime
kotlinx.datetime.Instant
kotlin.Pair
// kotlinx-immutable collections ARE stable, but their interfaces carry no
// @Stable of their own, so the compiler treats ImmutableList/Map/Set params as
// unstable without this. Covers Immutable* and Persistent* in the package.
kotlinx.collections.immutable.*
// Ktor's HttpClient is an app-lifetime singleton passed only as a transport
// (AppAsyncImage) - its identity never changes during a session, so treat it as
// stable for skipping. External type: can't annotate, hence listed here.
io.ktor.client.HttpClient
// Program is one of the app's OWN value types, but it lives in the Compose-free
// :feature:timetable:domain module, so it can't carry an @Immutable of its own
// (its immutable data class: id/name/nullable-colorArgb). Listed here instead so
// composables taking it (ProgramColorDialog/ProgramSwatch/…) stay skippable.
eu.anifantakis.commercials.feature.timetable.domain.model.Program
// NOTE: the app's OWN domain value types (StationAccess, ApiToken, ManagedUser,
// AdminApiToken, EmailPreviewRequest, …) are marked `@Immutable` at the source
// instead - the annotation is read by BOTH the compiler and the IDE, so the
// stability badges match reality. Only EXTERNAL types, or app types in a
// Compose-free module (see Program above), that can't be annotated belong here.
