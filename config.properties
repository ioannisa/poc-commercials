# Project-root config. In dev, both the server and the JVM desktop client
# run from the repo root and read this same file. In a real deployment each
# side would have its own file:
#
#   - Server install:  only `mysql.*` + whatever else the server consumes.
#   - Desktop install: only `server.baseUrl`.
#
# Keys used by the CLIENT (JVM desktop):
server.baseUrl=http://localhost:8080

# Keys used by the SERVER only (client ignores these):
mysql.jdbcUrl=jdbc:mysql://localhost:3306/commercials?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
mysql.username=root
mysql.password=rootpass123
