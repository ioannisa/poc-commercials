# Hosting layout for the Commercials Manager server.
#
# central  (REQUIRED, standalone): the server's OWN schema - application
#          users, tokens, and per-station grants. It must never double as a
#          group schema; the server refuses to start if a group below points
#          at the same database.
#
# groups   (OPTIONAL, 0..n): one entry per hosted company GROUP. A group owns
#          ONE database and hosts 1..n stations inside it.
#
#          This mirrors the original app exactly: it kept one MySQL database
#          per group and told the group's TV station apart from its radio
#          station with a `forTV` 0/1 column. Customers, contracts and contract
#          LINES are stored ONCE and shared, because one contract genuinely
#          sells on several media - Ανυφαντάκης buys 1 TV spot and 2 radio
#          spots on the SAME contract. Spots, programmes and breaks are per
#          station (they carry `station_id`, our generalization of `forTV`).
#
#          So: one legacy dump => one group database => 1..n stations. Group
#          schemas may live on the same MySQL server (as below) or on entirely
#          different ones - every group carries its own full jdbcUrl +
#          credentials (plaintext by design; this file is server-side
#          deployment config, keep it out of client bundles).
#
# A station's `id` is the stable key used in user grants and API calls, and it
# must be unique across ALL groups; `name` is what users see in the station
# dropdown. A station carries no connection details of its own - it IS a
# station_id inside its group's database.
#
# emptyRowsFrom (OPTIONAL, "HH:mm", default "00:00"): from this time on, the
#          hourly / half-hourly views print their grid rows even when EMPTY.
#          Before it, only times that actually HAVE a break appear.
#
#          Breaks are not configured anywhere - a break is simply a time a spot
#          aired at, and the grid groups the airings by it. So the only thing
#          left to decide is where to draw the empty scaffold, and that is a
#          property of the station's day: Crete TV starts at 07:00, so its grid
#          shows 00:05, 00:30 … 04:00 (the real breaks of the previous night)
#          and then jumps to a printed 07:00, 07:30, 08:00 … even where nothing
#          airs. Without it, an operator pages through fourteen blank night rows
#          to reach the working day. It NEVER hides a break.
#
# Connection pools: each GROUP database gets its own HikariCP pool, shared by
# every station in it. The optional file-wide `maxPoolSize` sets the default
# ceiling for central and every group; `maxPoolSize` on any single block
# overrides it. Defaults when unset: central 10, group 10. The theoretical peak
# against a MySQL server is the sum of the pools pointing at it, so tune this
# against its `max_connections` as groups grow. Example:
#
#   maxPoolSize: 8          # file-wide default for every pool
#   central:
#     maxPoolSize: 20       # central is hottest (token check per request)
#   groups:
#     - id: crete-group
#       maxPoolSize: 16     # override just this group (it hosts 3 stations)
#
# superAdmin (REQUIRED): the break-glass administrator. Deliberately PLAINTEXT
# here - same threat model as the DB credentials in this file, and the point:
# the operator can always look it up and can never be locked out (this file IS
# its recovery). The database stores only a PBKDF2 hash, re-synced at boot;
# rotate by editing the password here and restarting (old sessions revoked).
# This account manages users/grants and gets implicit access to every station.
#
# smtp (OPTIONAL): outgoing mail for customer schedule emails. Resolution is
# station -> group -> file-wide, so a station may send from its own address
# (the legacy behaviour) while its siblings fall back to the group's. Without
# any, email endpoints refuse with a clear message. Example:
#
#   smtp:
#     host: smtp.example.gr
#     port: 587
#     username: mailer@example.gr
#     password: app-password
#     from: station@example.gr
#
# session (OPTIONAL): bearer-token lifetime. Defaults: expiration on, 90 days,
# sliding. `expiration: false` = tokens never expire (revoked only by logout or
# a password change). When on, `days` is the lifetime and `sliding` decides
# whether using the app renews the window (idle timeout: an active user is
# never logged out mid-work) or the window is fixed from login. Example:
#
#   session:
#     expiration: true
#     days: 90
#     sliding: true
#
# Path override: -Dserver.config=<path> or COMMERCIALS_SERVER env var.
superAdmin:
  username: su
  password: 1234
  displayName: "Super Administrator"

session:
  expiration: true   # false = bearer tokens never expire (until logout / password change)
  days: 3            # token lifetime in days when expiration is enabled
  sliding: true      # true = window slides forward on use (idle timeout); false = fixed from login

# File-wide SMTP for customer schedule emails (a station/group block may override).
# Office 365 requires the From to be the authenticated mailbox; the display name is
# allowed. STARTTLS on 587. NOTE: real credential below - do NOT commit this file.
