# Hosting layout for the Commercials Manager server.
#
# central  (REQUIRED, standalone): the server's OWN schema - application
#          users, tokens, and per-station grants. It must never double as a
#          station schema; the server refuses to start if a station below
#          points at the same database.
#
# stations (OPTIONAL, 0..n): one entry per hosted TV/radio station. Identical
#          table structure per schema; schemas may live on the same MySQL
#          server (as below) or entirely different servers - every entry
#          carries its own full jdbcUrl + credentials (plaintext by design;
#          this file is server-side deployment config, keep it out of client
#          bundles).
#
# `id` is the stable key used in user grants and API calls; `name` is what
# users see in the station dropdown.
#
# Connection pools: each database gets its own HikariCP pool. The optional
# file-wide `maxPoolSize` below sets the default ceiling for central and every
# station; `maxPoolSize` on any single block overrides it. Defaults when unset:
# central 10, station 5. The theoretical peak against a MySQL server is the sum
# of the pools pointing at it, so tune this against its `max_connections` as
# stations grow. Example:
#
#   maxPoolSize: 8          # file-wide default for every pool
#   central:
#     maxPoolSize: 20       # central is hottest (token check per request)
#   stations:
#     - id: crete-tv
#       maxPoolSize: 3      # override just this station
#
# superAdmin (REQUIRED): the break-glass administrator. Deliberately PLAINTEXT
# here - same threat model as the DB credentials in this file, and the point:
# the operator can always look it up and can never be locked out (this file IS
# its recovery). The database stores only a PBKDF2 hash, re-synced at boot;
# rotate by editing the password here and restarting (old sessions revoked).
# This account manages users/grants and gets implicit access to every station.
#
# smtp (OPTIONAL): outgoing mail for customer schedule emails. File-wide
# default here; any station block may carry its own `smtp:` to send from its
# own address (the legacy behaviour). Without one, email endpoints refuse
# with a clear message. Example:
#
#   smtp:
#     host: smtp.example.gr
#     port: 587
#     username: mailer@example.gr
#     password: app-password
#     from: station@example.gr
#
# session (OPTIONAL): bearer-token lifetime. Defaults: expiration on, 90 days,
# sliding. `expiration: false` = tokens never expire (revoked only by logout or
# a password change). When on, `days` is the lifetime and `sliding` decides
# whether using the app renews the window (idle timeout: an active user is
# never logged out mid-work) or the window is fixed from login. Example:
#
#   session:
#     expiration: true
#     days: 90
#     sliding: true
#
# Path override: -Dserver.config=<path> or COMMERCIALS_SERVER env var.
superAdmin:
  username: su
  password: 1234
  displayName: "Super Administrator"

session:
  expiration: true   # false = bearer tokens never expire (until logout / password change)
  days: 90           # token lifetime in days when expiration is enabled
  sliding: true      # true = window slides forward on use (idle timeout); false = fixed from login

central:
  jdbcUrl: "jdbc:mysql://localhost:3306/commercials_central?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8"
  username: root
  password: rootpass123

stations:
  - id: crete-tv
    name: "Crete TV"
    jdbcUrl: "jdbc:mysql://localhost:3306/commercials_cretetv?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8"
    username: root
    password: rootpass123

  - id: radio-984
    name: "Radio 984"
    jdbcUrl: "jdbc:mysql://localhost:3306/commercials_radio984?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8"
    username: root
    password: rootpass123

  - id: channel-4
    name: "Channel 4"
    jdbcUrl: "jdbc:mysql://localhost:3306/commercials_channel4?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8"
    username: root
    password: rootpass123

  - id: my-sample
    name: "My Sample"
    jdbcUrl: "jdbc:mysql://localhost:3306/commercials_ctv_v2?useUnicode=true&characterEncoding=utf8"
    username: root
    password: rootpass123