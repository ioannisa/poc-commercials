  port: 587
  username: noreply@cretetv.gr
  password: "xxxxxxxxxxxxxx"
  from: "No Reply Cretetv <noreply@cretetv.gr>"
  startTls: true

# TEST safety valve: while set, EVERY customer schedule email is delivered HERE
