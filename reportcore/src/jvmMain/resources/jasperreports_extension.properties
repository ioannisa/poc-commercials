# Registers Roboto (the app's UI typeface) as a JasperReports font extension.
#
# The registry id MUST be `simple.font.families`: SimpleFontExtensionsRegistryFactory
# hard-codes the property prefix `net.sf.jasperreports.extension.simple.font.families.`
# in its bytecode and ignores any custom id. A distinct id silently registers
# nothing and every fontName fails with JRFontNotFoundException.
#
# Declaring the same factory key as jasperreports-fonts does is safe (identical
# value); the two font sets stay distinct through the SUFFIX (.dejavu / .roboto).
net.sf.jasperreports.extension.registry.factory.simple.font.families=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
net.sf.jasperreports.extension.simple.font.families.roboto=fonts/roboto/jasperreports-fonts.xml
