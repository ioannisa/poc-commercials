# First-run template for iOS.
#
# Bundled into the .ipa / simulator app. On first launch the app copies this
# file to <App container>/Documents/config.properties. All subsequent launches
# read that Documents file; user edits persist across app updates.
#
# To edit post-install:
#   - Simulator: ~/Library/Developer/CoreSimulator/Devices/<UUID>/data/
#     Containers/Data/Application/<UUID>/Documents/
#   - Device: Xcode -> Devices & Simulators -> app -> Download Container. For
#     in-place editing via the Files app, set UIFileSharingEnabled=YES and
#     LSSupportsOpeningDocumentsInPlace=YES in Info.plist.
#
# IMPORTANT: add this file to the iosApp Xcode target's Build Phases ->
# Copy Bundle Resources, otherwise the first-run copy will fail.
#
# iOS simulator shares the host's network stack, so localhost works. For a
# physical iPhone, change to the dev machine's LAN IP.
#
# The client only needs to know the application-server URL; MySQL lives in
# the server's own config.properties.

server.baseUrl=http://localhost:8080
